version: "3.9"

services:
  twilio-sms-mcp:
    build: .
    container_name: twilio-sms-mcp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - sms_data:/data
    stdin_open: true
    tty: false
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sms_data:
