version: "3.9"

services:
  # MCP server with stdio transport (for local Claude Desktop / CLI usage)
  twilio-sms-mcp:
    build: .
    container_name: twilio-sms-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: stdio
    ports:
      - "8080:8080"
    volumes:
      - sms_data:/data
    stdin_open: true
    tty: false
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # MCP server with SSE transport (network-accessible, multi-client)
  twilio-sms-mcp-sse:
    build: .
    container_name: twilio-sms-mcp-sse
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    ports:
      - "8000:8000"
      - "8081:8080"
    volumes:
      - sms_data_sse:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sms_data:
  sms_data_sse:
